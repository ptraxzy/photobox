<svg xmlns="http://www.w3.org/2000/svg" width="120" height="360" viewBox="0 0 400 1200">
      <defs>
        <mask id="hole-mask">
          <rect width="400" height="1200" fill="white" /><rect x="30" y="30" width="340" height="255" rx="20" ry="20" fill="black" /><rect x="30" y="315" width="340" height="255" rx="20" ry="20" fill="black" /><rect x="30" y="600" width="340" height="255" rx="20" ry="20" fill="black" /><rect x="30" y="885" width="340" height="255" rx="20" ry="20" fill="black" />
        </mask>
        
      </defs>
      <!-- Base Background Card -->
      <rect width="400" height="1200" fill="#ecd6ff" mask="url(#hole-mask)" />
      
      <!-- Slot outlines (adds a very nice border around punched slots for photo alignment) -->
      <rect x="30" y="30" width="340" height="255" rx="20" ry="20" fill="none" stroke="#7c3aed" stroke-width="4" opacity="0.3" />
<rect x="30" y="315" width="340" height="255" rx="20" ry="20" fill="none" stroke="#7c3aed" stroke-width="4" opacity="0.3" />
<rect x="30" y="600" width="340" height="255" rx="20" ry="20" fill="none" stroke="#7c3aed" stroke-width="4" opacity="0.3" />
<rect x="30" y="885" width="340" height="255" rx="20" ry="20" fill="none" stroke="#7c3aed" stroke-width="4" opacity="0.3" />
      
      <!-- Outer Border -->
      <rect width="400" height="1200" fill="none" stroke="#7c3aed" stroke-width="12" />
      
      <!-- Decorations Layer -->
      
      <!-- Soft lilac flowers -->
      <g stroke="#7c3aed" fill="none" stroke-width="1.5" opacity="0.7">
        <path d="M15,1150 Q20,1130 35,1140 T55,1120 Q60,1140 45,1150 Z" />
        <circle cx="35" cy="1140" r="3" fill="#7c3aed" />
        <path d="M385,1150 Q380,1130 365,1140 T345,1120 Q340,1140 355,1150 Z" />
        <circle cx="365" cy="1140" r="3" fill="#7c3aed" />
      </g>
    
      
      <!-- Branding Logo Text -->
      <text x="200" y="1175" font-family="'Plus Jakarta Sans', 'Outfit', sans-serif" font-weight="800" font-size="14" fill="#7c3aed" letter-spacing="3" text-anchor="middle">SNAPVIBE ✦ MEMORIES</text>
    </svg>