<svg xmlns="http://www.w3.org/2000/svg" width="120" height="360" viewBox="0 0 400 1200">
      <defs>
        <mask id="hole-mask">
          <rect width="400" height="1200" fill="white" /><rect x="30" y="30" width="340" height="255" rx="20" ry="20" fill="black" /><rect x="30" y="315" width="340" height="255" rx="20" ry="20" fill="black" /><rect x="30" y="600" width="340" height="255" rx="20" ry="20" fill="black" /><rect x="30" y="885" width="340" height="255" rx="20" ry="20" fill="black" />
        </mask>
        
      </defs>
      <!-- Base Background Card -->
      <rect width="400" height="1200" fill="#fff5d6" mask="url(#hole-mask)" />
      
      <!-- Slot outlines (adds a very nice border around punched slots for photo alignment) -->
      <rect x="30" y="30" width="340" height="255" rx="20" ry="20" fill="none" stroke="#c47a00" stroke-width="4" opacity="0.3" />
<rect x="30" y="315" width="340" height="255" rx="20" ry="20" fill="none" stroke="#c47a00" stroke-width="4" opacity="0.3" />
<rect x="30" y="600" width="340" height="255" rx="20" ry="20" fill="none" stroke="#c47a00" stroke-width="4" opacity="0.3" />
<rect x="30" y="885" width="340" height="255" rx="20" ry="20" fill="none" stroke="#c47a00" stroke-width="4" opacity="0.3" />
      
      <!-- Outer Border -->
      <rect width="400" height="1200" fill="none" stroke="#c47a00" stroke-width="12" />
      
      <!-- Decorations Layer -->
      
      <!-- Party balloons -->
      <g fill="#c47a00" opacity="0.65" transform="translate(20, 1130) scale(1.2)">
        <ellipse cx="15" cy="15" rx="10" ry="14" />
        <path d="M15,29 L15,40" stroke="#c47a00" stroke-width="1.5" />
      </g>
      <g fill="#c47a00" opacity="0.65" transform="translate(350, 1130) scale(1.2)">
        <ellipse cx="15" cy="15" rx="10" ry="14" />
        <path d="M15,29 L15,40" stroke="#c47a00" stroke-width="1.5" />
      </g>
    
      
      <!-- Branding Logo Text -->
      <text x="200" y="1175" font-family="'Plus Jakarta Sans', 'Outfit', sans-serif" font-weight="800" font-size="14" fill="#c47a00" letter-spacing="3" text-anchor="middle">SNAPVIBE ✦ MEMORIES</text>
    </svg>