<svg xmlns="http://www.w3.org/2000/svg" width="240" height="240" viewBox="0 0 800 800">
      <defs>
        <mask id="hole-mask">
          <rect width="800" height="800" fill="white" /><rect x="40" y="40" width="340" height="340" rx="20" ry="20" fill="black" /><rect x="420" y="40" width="340" height="340" rx="20" ry="20" fill="black" /><rect x="40" y="420" width="340" height="340" rx="20" ry="20" fill="black" /><rect x="420" y="420" width="340" height="340" rx="20" ry="20" fill="black" />
        </mask>
        
      <pattern id="panda-leaves" width="40" height="40" patternUnits="userSpaceOnUse">
        <rect width="40" height="40" fill="#ecfdf5" />
        <path d="M10,10 C15,5 25,5 20,15 C15,25 5,15 10,10 Z" fill="#047857" opacity="0.1" />
      </pattern>
    
      </defs>
      <!-- Base Background Card -->
      <rect width="800" height="800" fill="url(#panda-leaves)" mask="url(#hole-mask)" />
      
      <!-- Slot outlines (adds a very nice border around punched slots for photo alignment) -->
      <rect x="40" y="40" width="340" height="340" rx="20" ry="20" fill="none" stroke="#047857" stroke-width="4" opacity="0.3" />
<rect x="420" y="40" width="340" height="340" rx="20" ry="20" fill="none" stroke="#047857" stroke-width="4" opacity="0.3" />
<rect x="40" y="420" width="340" height="340" rx="20" ry="20" fill="none" stroke="#047857" stroke-width="4" opacity="0.3" />
<rect x="420" y="420" width="340" height="340" rx="20" ry="20" fill="none" stroke="#047857" stroke-width="4" opacity="0.3" />
      
      <!-- Outer Border -->
      <rect width="800" height="800" fill="none" stroke="#047857" stroke-width="12" />
      
      <!-- Decorations Layer -->
      
      <g transform="translate(720, 720) scale(1.4)">
        <circle cx="0" cy="0" r="28" fill="white" stroke="#047857" stroke-width="3" />
        <circle cx="-20" cy="-20" r="10" fill="#222" />
        <circle cx="20" cy="-20" r="10" fill="#222" />
        <ellipse cx="-8" cy="-2" rx="7" ry="9" fill="#222" transform="rotate(-15, -8, -2)" />
        <ellipse cx="8" cy="-2" rx="7" ry="9" fill="#222" transform="rotate(15, 8, -2)" />
        <circle cx="-7" cy="-2" r="2" fill="white" />
        <circle cx="7" cy="-2" r="2" fill="white" />
        <ellipse cx="0" cy="10" rx="4" ry="2.5" fill="#222" />
      </g>
      
      <g stroke="#047857" stroke-width="3" fill="none" stroke-linecap="round">
        <path d="M -10,30 Q 80,40 120,-10" />
        <path d="M 40,32 Q 50,15 70,25 Q 50,40 40,32 Z" fill="#34d399" stroke="#047857" stroke-width="1.5" />
        <path d="M 80,28 Q 95,10 110,20 Q 95,35 80,28 Z" fill="#34d399" stroke="#047857" stroke-width="1.5" />
      </g>
      
      <text x="140" y="760" font-family="'Plus Jakarta Sans', sans-serif" font-weight="900" font-size="24" fill="#047857" text-anchor="middle">Panda Garden</text>
    
      
      <!-- Branding Logo Text -->
      <text x="400" y="780" font-family="'Plus Jakarta Sans', 'Outfit', sans-serif" font-weight="800" font-size="15" fill="#047857" letter-spacing="3" text-anchor="middle">SNAPVIBE ✦ STUDIO</text>
    </svg>