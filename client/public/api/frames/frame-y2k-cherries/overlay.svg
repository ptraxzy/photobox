<svg xmlns="http://www.w3.org/2000/svg" width="400" height="1200" viewBox="0 0 400 1200">
      <defs>
        <mask id="hole-mask">
          <rect width="400" height="1200" fill="white" /><rect x="30" y="30" width="340" height="255" rx="20" ry="20" fill="black" /><rect x="30" y="315" width="340" height="255" rx="20" ry="20" fill="black" /><rect x="30" y="600" width="340" height="255" rx="20" ry="20" fill="black" /><rect x="30" y="885" width="340" height="255" rx="20" ry="20" fill="black" />
        </mask>
        
      <pattern id="cherry-pat" width="80" height="80" patternUnits="userSpaceOnUse">
        <rect width="80" height="80" fill="#f3e8ff" />
        <circle cx="20" cy="20" r="3" fill="#ec4899" opacity="0.15" />
      </pattern>
    
      </defs>
      <!-- Base Background Card -->
      <rect width="400" height="1200" fill="url(#cherry-pat)" mask="url(#hole-mask)" />
      
      <!-- Slot outlines (adds a very nice border around punched slots for photo alignment) -->
      <rect x="30" y="30" width="340" height="255" rx="20" ry="20" fill="none" stroke="#a855f7" stroke-width="4" opacity="0.3" />
<rect x="30" y="315" width="340" height="255" rx="20" ry="20" fill="none" stroke="#a855f7" stroke-width="4" opacity="0.3" />
<rect x="30" y="600" width="340" height="255" rx="20" ry="20" fill="none" stroke="#a855f7" stroke-width="4" opacity="0.3" />
<rect x="30" y="885" width="340" height="255" rx="20" ry="20" fill="none" stroke="#a855f7" stroke-width="4" opacity="0.3" />
      
      <!-- Outer Border -->
      <rect width="400" height="1200" fill="none" stroke="#a855f7" stroke-width="12" />
      
      <!-- Decorations Layer -->
      
      <g transform="translate(60, 60) scale(1.3)">
        <circle cx="10" cy="30" r="10" fill="#db2777" />
        <circle cx="28" cy="34" r="10" fill="#db2777" />
        <path d="M10,20 Q22,4 22,-6 M28,24 Q22,4 22,-6" stroke="#22c55e" stroke-width="2.5" fill="none" />
        <path d="M22,-6 Q35,-15 40,-12" stroke="#22c55e" stroke-width="2" fill="none" />
      </g>
      <g transform="translate(310, 1070) scale(1.3)">
        <circle cx="10" cy="30" r="10" fill="#db2777" />
        <circle cx="28" cy="34" r="10" fill="#db2777" />
        <path d="M10,20 Q22,4 22,-6 M28,24 Q22,4 22,-6" stroke="#22c55e" stroke-width="2.5" fill="none" />
        <path d="M22,-6 Q35,-15 40,-12" stroke="#22c55e" stroke-width="2" fill="none" />
      </g>
      
      <path d="M10,0 L12,4 L16,5 L12,6 L10,10 L8,6 L4,5 L8,4 Z" fill="#ec4899" transform="translate(320, 150) scale(2)" />
      <path d="M10,0 L12,4 L16,5 L12,6 L10,10 L8,6 L4,5 L8,4 Z" fill="#ec4899" transform="translate(60, 480) scale(1.5)" />
      <path d="M10,0 L12,4 L16,5 L12,6 L10,10 L8,6 L4,5 L8,4 Z" fill="#ec4899" transform="translate(320, 800) scale(1.8)" />
      
      <text x="200" y="1180" font-family="'Plus Jakarta Sans', sans-serif" font-weight="900" font-size="28" fill="#db2777" text-anchor="middle" letter-spacing="2">CHERRY BOMB</text>
    
      
      <!-- Branding Logo Text -->
      <text x="200" y="1175" font-family="'Plus Jakarta Sans', 'Outfit', sans-serif" font-weight="800" font-size="14" fill="#a855f7" letter-spacing="3" text-anchor="middle">SNAPVIBE ✦ MEMORIES</text>
    </svg>