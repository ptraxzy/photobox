<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800">
      <defs>
        <mask id="hole-mask">
          <rect width="800" height="800" fill="white" /><rect x="40" y="40" width="340" height="340" rx="20" ry="20" fill="black" /><rect x="420" y="40" width="340" height="340" rx="20" ry="20" fill="black" /><rect x="40" y="420" width="340" height="340" rx="20" ry="20" fill="black" /><rect x="420" y="420" width="340" height="340" rx="20" ry="20" fill="black" />
        </mask>
        
      </defs>
      <!-- Base Background Card -->
      <rect width="800" height="800" fill="#fcfbfa" mask="url(#hole-mask)" />
      
      <!-- Slot outlines (adds a very nice border around punched slots for photo alignment) -->
      <rect x="40" y="40" width="340" height="340" rx="20" ry="20" fill="none" stroke="#ca9b2b" stroke-width="4" opacity="0.3" />
<rect x="420" y="40" width="340" height="340" rx="20" ry="20" fill="none" stroke="#ca9b2b" stroke-width="4" opacity="0.3" />
<rect x="40" y="420" width="340" height="340" rx="20" ry="20" fill="none" stroke="#ca9b2b" stroke-width="4" opacity="0.3" />
<rect x="420" y="420" width="340" height="340" rx="20" ry="20" fill="none" stroke="#ca9b2b" stroke-width="4" opacity="0.3" />
      
      <!-- Outer Border -->
      <rect width="800" height="800" fill="none" stroke="#ca9b2b" stroke-width="12" />
      
      <!-- Decorations Layer -->
      
      <!-- Elegant gold foliage branches in corners -->
      <g stroke="#ca9b2b" stroke-width="2" fill="none" opacity="0.75">
        <!-- Top Left -->
        <path d="M30,30 Q60,30 80,60" />
        <path d="M40,30 Q45,20 50,30" fill="#ca9b2b" />
        <path d="M60,30 Q65,20 70,30" fill="#ca9b2b" />
        <!-- Bottom Right -->
        <path d="M770,770 Q740,770 720,740" />
        <path d="M760,770 Q755,780 750,770" fill="#ca9b2b" />
        <path d="M740,770 Q735,780 730,770" fill="#ca9b2b" />
      </g>
    
      
      <!-- Branding Logo Text -->
      <text x="400" y="780" font-family="'Plus Jakarta Sans', 'Outfit', sans-serif" font-weight="800" font-size="15" fill="#ca9b2b" letter-spacing="3" text-anchor="middle">SNAPVIBE ✦ STUDIO</text>
    </svg>