<svg xmlns="http://www.w3.org/2000/svg" width="180" height="210" viewBox="0 0 600 700">
      <defs>
        <mask id="hole-mask">
          <rect width="600" height="700" fill="white" /><rect x="40" y="40" width="520" height="520" rx="20" ry="20" fill="black" />
        </mask>
        
      </defs>
      <!-- Base Background Card -->
      <rect width="600" height="700" fill="#f5f5f0" mask="url(#hole-mask)" />
      
      <!-- Slot outlines (adds a very nice border around punched slots for photo alignment) -->
      <rect x="40" y="40" width="520" height="520" rx="20" ry="20" fill="none" stroke="#2c2c2c" stroke-width="4" opacity="0.3" />
      
      <!-- Outer Border -->
      <rect width="600" height="700" fill="none" stroke="#2c2c2c" stroke-width="12" />
      
      <!-- Decorations Layer -->
      
      <!-- Washi tape indicators -->
      <rect x="250" y="10" width="100" height="24" fill="#fcf6b1" opacity="0.7" transform="rotate(-3, 300, 20)" rx="2" />
      <rect x="250" y="630" width="100" height="24" fill="#fcf6b1" opacity="0.7" transform="rotate(2, 300, 640)" rx="2" />
    
      
      <!-- Branding Logo Text -->
      <text x="300" y="680" font-family="'Plus Jakarta Sans', 'Outfit', sans-serif" font-weight="800" font-size="15" fill="#2c2c2c" letter-spacing="3" text-anchor="middle">SNAPVIBE ✦ STUDIO</text>
    </svg>